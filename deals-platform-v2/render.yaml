databases:
  - name: postgres
    plan: free
    databaseName: deals
    user: deals
    ipAllowList: []

services:
  - type: web
    name: backend
    runtime: python
    rootDir: deals-platform-v2/backend
    buildCommand: pip install -r requirements.txt
    startCommand: poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: COMPANIES_HOUSE_API_KEY
        sync: false
      - key: SEC_USER_AGENT
        value: "DealsPlatformPoC admin@example.com"
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: frontend
    runtime: node
    rootDir: deals-platform-v2/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: backend
          property: hostport
